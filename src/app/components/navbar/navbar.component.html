<nav class="navbar">
  <div class="container navbar__container">
    <!-- Logo -->
    <a href="#" class="navbar__logo">
      <img
        [src]="themeService.theme() === 'dark' ? 'assets/svg/rb-logo-white.svg' : 'assets/svg/rb-logo-black.svg'"
        alt="Rafael Bañon"
        class="navbar__logo-image"
      />
    </a>

    <!-- Desktop Navigation Tabs -->
    <ul class="navbar__tabs">
      @for (tab of tabs; track tab.id) {
        <li>
          <button
            class="navbar__tab"
            [class.active]="activeTab === tab.id"
            (click)="switchTab(tab.id)"
          >
            {{ tab.label }}
          </button>
        </li>
      }
    </ul>

    <!-- Controls -->
    <div class="navbar__controls">
      <!-- Download CV -->
      <button class="navbar__cv-btn" (click)="downloadCV()" aria-label="Download CV">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>CV</span>
      </button>

      <!-- Language Toggle -->
      <div class="navbar__lang-toggle">
        <button
          class="navbar__lang-btn"
          [class.active]="currentLang === 'en'"
          (click)="setLanguage('en')"
          aria-label="Switch to English"
        >
          EN
        </button>
        <span class="navbar__lang-separator">|</span>
        <button
          class="navbar__lang-btn"
          [class.active]="currentLang === 'es'"
          (click)="setLanguage('es')"
          aria-label="Cambiar a español"
        >
          ES
        </button>
      </div>

      <!-- Theme Toggle -->
      <button
        class="navbar__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [innerHTML]="getThemeIcon()"
      ></button>

      <!-- Mobile Menu Toggle -->
      <button
        class="navbar__menu-toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Toggle menu"
      >
        <span class="navbar__menu-icon"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="navbar__mobile-menu" [class.open]="isMenuOpen">
    <ul class="navbar__mobile-links">
      @for (tab of tabs; track tab.id) {
        <li>
          <button
            class="navbar__mobile-link"
            [class.active]="activeTab === tab.id"
            (click)="switchTab(tab.id); closeMenu()"
          >
            {{ tab.label }}
          </button>
        </li>
      }
      <li>
        <button class="navbar__mobile-link navbar__mobile-cv" (click)="downloadCV(); closeMenu()">
          Download CV
        </button>
      </li>
    </ul>
  </div>
</nav>
