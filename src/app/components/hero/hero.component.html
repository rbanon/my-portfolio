<section class="hero" id="hero">
  <div class="container hero__container">
    <!-- Skeleton Loading State -->
    <div class="hero__skeleton" *ngIf="isLoading">
      <div class="hero__skeleton-title"></div>
      <div class="hero__skeleton-subtitle"></div>
      <div class="hero__skeleton-tagline"></div>
      <div class="hero__skeleton-buttons">
        <div class="hero__skeleton-button"></div>
        <div class="hero__skeleton-button"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="hero__content" *ngIf="!isLoading">
      <div>
        <img
          [src]="themeService.theme() === 'dark' ? 'assets/svg/rb-logo-white.svg' : 'assets/svg/rb-logo-black.svg'"
          alt="Rafael Bañon"
          class="hero__logo"
        />
      </div>
      <h1 class="hero__title">{{ 'hero.title' | transloco }}</h1>
      <p class="hero__subtitle">{{ 'hero.subtitle' | transloco }}</p>
      <p class="hero__tagline">{{ 'hero.tagline' | transloco }}</p>
    </div>
  </div>

  <!-- Animated Background -->
  <div class="hero__background"></div>
</section>
